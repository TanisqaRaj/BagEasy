version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENDEE_HOST=endee
      - ENDEE_PORT=8001
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - endee
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  endee:
    image: endeeio/endee:latest
    ports:
      - "8001:8001"
    volumes:
      - endee_data:/data

volumes:
  uploads:
  endee_data:
